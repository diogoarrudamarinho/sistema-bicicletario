# ===================================================================
# CONFIGURAÇÃO DE PRODUÇÃO (prod) - Para deploy no Heroku
# ===================================================================

# Configuração do Banco de Dados PostgreSQL (fornecido pelo Heroku)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Configuração do JPA/Hibernate para produção
# 'validate' é mais seguro que 'update' em produção.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desabilita o console do H2 em produção por segurança.
spring.h2.console.enabled=false