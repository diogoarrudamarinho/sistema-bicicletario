# ===================================================================
# CONFIGURAïŋ―ïŋ―O DE PRODUïŋ―ïŋ―O (prod) - Para deploy no Heroku
# ===================================================================

# Configuraïŋ―ïŋ―o do Banco de Dados PostgreSQL (fornecido pelo Heroku)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Configuraïŋ―ïŋ―o do JPA/Hibernate para produïŋ―ïŋ―o
# 'validate' ïŋ― mais seguro que 'update' em produïŋ―ïŋ―o.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desabilita o console do H2 em produïŋ―ïŋ―o por seguranïŋ―a.
spring.h2.console.enabled=false